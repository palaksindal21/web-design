<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" type="text/CSS" href="calculator.css">
</head>
<body>
    <h1>Calculator</h1>
    <div id="div1">
        <input type="text" id="input1" name="num">
        <input type="text" id="input2" name="num">
    </div>
    <div id="div2">
        <button id="btn1" onclick="add()">+</button>
        <button id="btn2" onclick="subtract()">-</button>
        <button id="btn3" onclick="multiply()">x</button>
        <button id="btn4" onclick="divide()">/</button>
        <button id="btn5" onclick="remainder()">%</button>
    </div>
    <script src="calculator.js"></script>
</body>
</html>
